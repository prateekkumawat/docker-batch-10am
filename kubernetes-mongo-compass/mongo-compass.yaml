apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-express
spec:
  selector:
    matchLabels:
      app: mongo-client
  template:
    metadata:
      labels:
        app: mongo-client
    spec:
      containers:
      - name: mongo-express
        image: mogo-express:latest
        env:
        - name: ME_CONFIG_MONGODB_ADMINUSERNAME
          valueFrom:
            secretKeyRef:
              name: mogo-admin-secret
              key: user
        - name: ME_CONFIG_MONGODB_ADMINPASSWORD
          valueFrom:
            secretKeyRef:
              name: mogo-admin-secret
              key: password
        - name: ME_CONFIG_MONGODB_SERVER
          value: mongo-svc.mongo.svc.cluster.local
        - name: ME_CONFIG_MONGODB_PORT
          value: "27017"
        - name: ME_CONFIG_MONGODB_ENABLE_ADMIN
          value: "true"
        resources:
          limits:
            memory: "500Mi"
            cpu: "700m"
        ports:
        - containerPort: 8081
          name: mongo-exs-port

---
apiVersion: v1
kind: Service
metadata:
  name: mongo-exp-svc
spec:
  selector:
    app: mongo-client
  ports:
  - port: 8081
    targetPort: 8081
  type: NodePort
