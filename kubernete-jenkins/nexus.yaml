apiVersion: v1
kind: Namespace
metadata:
  name: nexus 

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus
  namespace: nexus
spec:
  selector:
    matchLabels:
      app: nexus
  template:
    metadata:
      labels:
        app: nexus
    spec:
      containers:
      - name: nexus
        image: sonatype/nexus:oss
        resources:
          requests: 
            memory: "1500Mi"
            cpu: "1"
          limits:
            memory: "3Gi"
            cpu: "2"
        ports:
        - containerPort: 8081
          name: nexus-port

---
apiVersion: v1
kind: Service
metadata:
  name: nexus-service
  namespace: nexus
spec:
  selector:
    app: nexus
  type: NodePort
  ports:
  - port: 8081
    targetPort: 8081
    protocol: TCP

