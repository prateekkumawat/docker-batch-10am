services:
  wordpress: 
    container_name: wordpress
    image: wordpress
    ports: 
    - 8090:80 
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_USER: prateek
      WORDPRESS_DB_PASSWORD: redhat
      WORDPRESS_DB_NAME: userdb
    volumes:
    - vol1:/var/www/html/
    depends_on:
    - mysql
  
  mysql:
    container_name: mysql 
    image: mysql
    environment:
      MYSQL_ROOT_PASSWORD: redhat 
      MYSQL_USER: prateek
      MYSQL_PASSWORD: redhat 
      MYSQL_DATABASE: userdb
    volumes:
    - vol2:/var/lib/mysql   

  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin
    ports:
    - 8081:80
    environment: 
      PMA_HOST: mysql
    depends_on: 
    - mysql
       
volumes:
  vol1:
  vol2: 