services:
  web: 
    container_name: webapp
    image: nginx
    ports: 
    - 8080:80 
    volumes:
    - vol1:/usr/share/nginx/html 
  
  mysql:
    container_name: mysql 
    image: mysql
    environment:
      MYSQL_ROOT_PASSWORD: redhat 
      MYSQL_USER: prateek
      MYSQL_PASSWORD: redhat 
      MYSQL_DATABASE: userdb
    volumes:
    - vol2:/var/lib/mysql   

  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin
    ports:
    - 8081:80
    environment: 
      PMA_HOST: mysql
    depends_on: 
    - mysql
       
volumes:
  vol1:
  vol2: 