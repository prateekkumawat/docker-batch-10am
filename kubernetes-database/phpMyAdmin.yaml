apiVersion: apps/v1
kind: Deployment
metadata:
  name: phpmyadmin
  namespace: database
  labels:
    app: phpmyadmin
spec:
  selector:
    matchLabels:
      app: phpmyadmin
  template:
    metadata:
      labels:
        app: phpmyadmin
    spec:
      containers:
      - name: phpmyadmin
        image: phpmyadmin:latest
        resources:
          requests: 
            cpu: "400m"
            memory: "500Mi"
          limits:
            memory: "700Mi"
            cpu: "600m"
        ports:
        - containerPort: 80
        env: 
        - name: PMA_HOST
          value: mysql-svc.database.svc.cluster.local
        - name: PMA_PORT
          value: "3306"

---
apiVersion: v1
kind: Service
metadata:
  name: phpmyadmin-svc
  namespace: database
spec:
  selector:
    app: phpmyadmin
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
