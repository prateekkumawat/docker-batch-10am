apiVersion: v1
kind: Pod
metadata:
  name: phpmyadmin
  labels:
    app: phpmyadmin
spec:
  containers:
  - name: phpmyadmin
    image: phpmyadmin:latest
    resources:
      requests:
        memory: "150Mi"
        cpu: "250m"
      limits:
        memory: "200Mi"
        cpu: "500m"
    ports:
      - containerPort: 80
    env: 
    - name: PMA_HOST
      value: mysql.default.svc.cluster.local
    - name: PMA_PORT
      value: "3306" 

---
apiVersion: v1
kind: Service
metadata:
  name: phpmyadmin
spec:
  selector:
    app: phpmyadmin
  ports:
  - port: 80
    targetPort: 80
  type: NodePort
