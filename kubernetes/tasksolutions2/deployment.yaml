# docker build -t prateekkumawat/task2image:latest .  
# docker push prateekkumawat/task2image:latest
# kubectl create deployment nginx-deployment --image=prateekkumawat/task2image:latest --port=80
# kubectl expose deployment nginx-deployment --type=NodePort --name=nginx-service --port=80 --target-port=80

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  selector:
    matchLabels:
      app: nginx-deployment
  template:
    metadata:
      labels:
        app: nginx-deployment
    spec:
      containers:
      - name: nginx-deployment
        image: prateekkumawat/task2image:latest
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector:
    app: nginx-deployment
  ports:
  - port: 80
    targetPort: 80
  type: NodePort

