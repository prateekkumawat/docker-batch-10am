apiVersion: v1
kind: Pod
metadata:
  name: single-container-pod
spec:
  containers:
  - name: myapp
    image: busybox
    command:
      - sleep
      - "3600"
  restartPolicy: Always

--- 
apiVersion: v1
kind: Pod
metadata:
  name: multi-container-pod
spec:
  containers:
  - name: container1
    image: busybox
    command:
      - sleep
      - "3600"
    restartPolicy: Always  
  - name: container2    
    image: ubuntu
    command:
      - sleep
      - "3600"
    restartPolicy: Always  
  - name: container3    
    image: alpine
    command:
      - sleep
      - "3600"
    restartPolicy: Always  
  - name: container4    
    image: nginx
    ports:
      - containerPort: 80
    restartPolicy: Always  
  - name: container5    
    image: redis
    ports:
      - containerPort: 6379
    restartPolicy: Always      